services:
  postgres:
    image: postgres:16-alpine
    container_name: easy-shope-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-easy_shope}
      POSTGRES_USER: ${POSTGRES_USER:-easy_shope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-easy_shope_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: easy-shope-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  api:
    build:
      context: ./apps/api
    container_name: easy-shope-api
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-easy_shope}:${POSTGRES_PASSWORD:-easy_shope_dev}@postgres:5432/${POSTGRES_DB:-easy_shope}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-only-change-me}
      PLATFORM_OWNER_EMAIL: ${PLATFORM_OWNER_EMAIL:-owner@easyshope.local}
      PLATFORM_OWNER_PASSWORD: ${PLATFORM_OWNER_PASSWORD:-ChangeMe123!}
      GITHUB_ACTIONS_DISPATCH_TOKEN: ${GITHUB_ACTIONS_DISPATCH_TOKEN:-}
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-}
      GITHUB_DISPATCH_REF: ${GITHUB_DISPATCH_REF:-main}
      ANDROID_BUILD_WORKFLOW_FILE: ${ANDROID_BUILD_WORKFLOW_FILE:-build-tenant-apk.yml}
      ANDROID_BUILD_CALLBACK_SECRET: ${ANDROID_BUILD_CALLBACK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    image: nginx:1.27-alpine
    container_name: easy-shope-web
    restart: unless-stopped
    ports:
      - "8098:80"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./deploy/site:/usr/share/nginx/html:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro

volumes:
  postgres-data:
  redis-data:
