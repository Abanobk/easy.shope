# Deploy to TrueNAS from GitHub Actions.
# Uses Tailscale so the runner can reach the NAS Tailscale IP (e.g. 100.92.194.111).
# Cloudflare ssh-deploy hostname often times out from GitHub's network; Tailscale avoids that.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "${SSH_PRIVATE_KEY:-}" || { echo "Missing secret SSH_PRIVATE_KEY"; exit 1; }
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Strip CR (browser/Windows paste) and ensure trailing newline — fixes many "error in libcrypto" cases
          printf '%s\n' "${SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Verifying key fingerprint (public side only):"
          ssh-keygen -l -f ~/.ssh/deploy_key || { echo "SSH_PRIVATE_KEY is not a valid OpenSSH private key. Re-copy from: cat ~/.ssh/github_deploy_easyshope"; exit 1; }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Trust host key
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          test -n "${SSH_HOST:-}" || { echo "Missing secret SSH_HOST"; exit 1; }
          if [ -n "${SSH_KNOWN_HOSTS:-}" ]; then
            echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            echo "SSH_KNOWN_HOSTS not set; using ssh-keyscan after Tailscale"
            ssh-keyscan -H -T 30 "$SSH_HOST" >> ~/.ssh/known_hosts || true
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Upload deploy bundle
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "${SSH_USER:-}" || { echo "Missing secret SSH_USER"; exit 1; }
          test -n "${DEPLOY_PATH:-}" || { echo "Missing secret DEPLOY_PATH"; exit 1; }
          tar -czf /tmp/easy-shope-deploy.tgz docker-compose.yml .env.example deploy apps
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o IdentitiesOnly=yes \
            "${SSH_USER}@${SSH_HOST}" \
            "set -euo pipefail; mkdir -p \"${DEPLOY_PATH}\""
          cat /tmp/easy-shope-deploy.tgz | ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o IdentitiesOnly=yes \
            "${SSH_USER}@${SSH_HOST}" \
            "set -euo pipefail; tar -xzf - -C \"${DEPLOY_PATH}\""

      - name: Run docker compose on TrueNAS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o IdentitiesOnly=yes \
            "${SSH_USER}@${SSH_HOST}" \
            "set -euo pipefail; cd \"${DEPLOY_PATH}\"; test -f .env || cp .env.example .env; (docker compose version >/dev/null 2>&1 || docker-compose version >/dev/null 2>&1) || { echo 'Docker Compose is not available on TrueNAS shell'; exit 1; }; if docker compose version >/dev/null 2>&1; then docker compose up -d postgres redis; docker compose up -d --build --remove-orphans --force-recreate api web; else docker-compose up -d postgres redis; docker-compose up -d --build --remove-orphans --force-recreate api web; fi; for i in \$(seq 1 40); do curl -fsS http://127.0.0.1:8098/api/health | grep -q 'easy-shope-api' && break; sleep 2; done; curl -fsS http://127.0.0.1:8098/api/health | grep 'easy-shope-api'; printf '%s %s\n' \"\$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")\" \"${GITHUB_SHA}\" | tee \"${DEPLOY_PATH}/phase2_last_deploy.txt\" >/dev/null"
