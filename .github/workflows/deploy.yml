# Phase 0: verify GitHub Actions can SSH into TrueNAS (e.g. via ssh-deploy.easytecheg.net)
name: Deploy (Phase 0)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "${SSH_PRIVATE_KEY:-}" || { echo "Missing secret SSH_PRIVATE_KEY"; exit 1; }
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Trust host key
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          test -n "${SSH_HOST:-}" || { echo "Missing secret SSH_HOST"; exit 1; }
          if [ -n "${SSH_KNOWN_HOSTS:-}" ]; then
            echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            echo "SSH_KNOWN_HOSTS not set; using ssh-keyscan (add secret for stricter trust)"
            ssh-keyscan -H -T 30 "$SSH_HOST" >> ~/.ssh/known_hosts || true
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Remote deploy marker
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "${SSH_USER:-}" || { echo "Missing secret SSH_USER"; exit 1; }
          test -n "${DEPLOY_PATH:-}" || { echo "Missing secret DEPLOY_PATH"; exit 1; }
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o IdentitiesOnly=yes \
            "${SSH_USER}@${SSH_HOST}" \
            "set -euo pipefail; mkdir -p \"${DEPLOY_PATH}\"; printf '%s %s\\n' \"\$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")\" \"${GITHUB_SHA}\" | tee \"${DEPLOY_PATH}/phase0_last_deploy.txt\" >/dev/null"

      - name: Show remote marker (no secrets)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o IdentitiesOnly=yes \
            "${SSH_USER}@${SSH_HOST}" \
            "wc -c \"${DEPLOY_PATH}/phase0_last_deploy.txt\" && head -n1 \"${DEPLOY_PATH}/phase0_last_deploy.txt\""
