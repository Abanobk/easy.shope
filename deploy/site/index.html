<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Easy Shope</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: #0f172a; color: #f8fafc; display: grid; min-height: 100vh; place-items: center; }
    main { max-width: 720px; padding: 48px 24px; text-align: center; }
    .badge { display: inline-block; padding: 8px 14px; border-radius: 999px; background: #1e293b; color: #93c5fd; margin-bottom: 24px; }
    h1 { font-size: clamp(36px, 7vw, 72px); margin: 0 0 16px; }
    p { font-size: 20px; line-height: 1.8; color: #cbd5e1; }
    code { color: #86efac; }
  </style>
</head>
<body>
  <main>
    <div class="badge">Phase 1 Online</div>
    <h1>Easy Shope</h1>
    <p>تم نشر صفحة اختبار حقيقية من GitHub Actions إلى TrueNAS عبر Tailscale، وتعمل عبر Cloudflare Tunnel.</p>
    <p>Health check: <code>/health</code></p>
  </main>
</body>
</html>
